name: Monthly data refresh

# Refreshes the publication / federal-funding / outcomes signals once a month
# and pushes, which triggers Vercel's auto-deploy. A cloud runner also has a
# fresh IP, so the OpenAlex rate-limiting that blocks local founder runs is
# avoided. Manual runs available via the "Run workflow" button.
on:
  schedule:
    - cron: "27 7 3 * *" # 07:27 UTC on the 3rd of each month
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pipeline deps
        run: pip install -r pipeline/requirements.txt

      - name: Refresh signal layers + rebuild dataset
        run: bash pipeline/refresh.sh

      - name: Commit & push if data changed
        run: |
          git config user.name "fellow-signal-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/processed web/data/dataset.json
          if git diff --cached --quiet; then
            echo "No data changes this run."
          else
            git commit -m "Monthly data refresh (automated)

            Co-Authored-By: Claude Opus 4.8 (1M context) <noreply@anthropic.com>"
            git push
          fi
